#
# Minimal config as a customization base.
#
# This config assumes you supply "-server.host", "-server.port" and
# "-repo.scanPath" CLI options.
#
# Docker image uses this file as a fallback config.

meta:
  # For top page heading and website's "<title>".
  title: "legit"

  # For top page description and "<meta name="description">"
  description: ""

  # Enables syntax highlighting on blob page.
  syntaxHighlight: true

ui:
  footer:
    poweredBy: true
